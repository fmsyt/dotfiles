# keycodes: https://github.com/emberian/evdev/blob/1d020f11b283b0648427a2844b6b980f1a268221/src/scancodes.rs#L26-L572
keymap:
  - name: ime
    exact_match: true
    remap:
      Shift-CapsLock: C-M-SHIFT-KEY_F1
  - name: browser-terminal-like
    application:
      only:
        - /google-chrome|Google Chrome/
        - /chromium|Chromium/
        - /firefox|Firefox/
        - /zen|Zen/
        - /brave|Brave Browser|brave-browser/
        - /vivaldi|Vivaldi/
        - /microsoft-edge|Microsoft Edge/
        - /opera|Opera/
        - /floorp|Floorp/
        - /librewolf|LibreWolf/
        - /qutebrowser/
    exact_match: true
    remap:
      Ctrl-W: Ctrl-BackSpace
